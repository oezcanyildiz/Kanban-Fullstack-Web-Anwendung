services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: teamsync_db
      POSTGRES_USER: springuser
      POSTGRES_PASSWORD: springpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U springuser -d teamsync_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/teamsync_db
      - DB_USER=springuser
      - DB_PASSWORD=springpassword
      - JWT_SECRET=MeinSuperGeheimesPasswortDasNiemandErratenKann1234567890
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
